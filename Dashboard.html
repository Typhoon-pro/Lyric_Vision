<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LyricVision</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0; top: 0;
            width: 260px; height: 100vh;
            background: rgba(15, 15, 30, 0.95);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            margin-bottom: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .user-info { display: flex; align-items: center; gap: 12px; }

        .user-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .user-name { font-weight: 500; font-size: 0.95rem; }
        .user-email { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

        .main-content { margin-left: 260px; padding: 40px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-header h1 { font-size: 1.8rem; }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-card .label { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }

        .section-title { font-size: 1.3rem; margin-bottom: 20px; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .video-card:hover {
            border-color: rgba(168, 85, 247, 0.3);
            transform: translateY(-4px);
        }

        .video-thumb {
            height: 160px;
            background: linear-gradient(135deg, #1a0a2e, #302b63);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .video-info { padding: 20px; }
        .video-info h3 { font-size: 1rem; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
